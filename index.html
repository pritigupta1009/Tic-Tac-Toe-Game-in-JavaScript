<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
    <!-- linking html and css -->
</head>
<body>
    <header>
        <h1>TIC-TAC-TOE !!</h1><br>
    </header>

    <div id="container">
        <div style="align-content: center; height: 300px; width: 300px;">
            <img src="red user.jpg" alt="Left Image" class="side-image" id="left-img">
            <p style="color: white; font-size: 20px; margin: 0">Player X</p>
        </div>

        <div id="board">
            <div id="b1">
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
            </div>
            <div id="b2">
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
            </div>
            <div id="b3">
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
            </div>
        </div>

        <div style="align-content: center; height: 300px; width: 300px;">
            <img src="blue user.jpg" alt="Right Image" class="side-image" id="right-img">
            <p style="color: white; font-size: 20px; margin: 0;">Player O</p>
        </div>
    </div>
        
    <button id="reset_btn">Reset</button>

    <footer>
        <h3>Designed by @Priti Gupta | Contact: pritigupta9753@gmail.com | Phone: (+91) 7278291718</h3>
    </footer>

    <script src="app.js"></script>
</body>
</html>
