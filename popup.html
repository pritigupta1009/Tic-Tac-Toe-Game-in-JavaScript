<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Popup Example</title>
  <style>
    /* Overlay background */
    .popup-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      justify-content: center;
      align-items: center;
    }

    /* Popup box */
    .popup {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
      width: 300px;
      text-align: center;
    }

    .popup button {
      margin-top: 10px;
      padding: 5px 10px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .popup button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <button onclick="showPopup()">Show Popup</button>

  <div class="popup-overlay" id="popupOverlay">
    <div class="popup">
      <p>Hello! This is a custom popup message.</p>
      <button onclick="closePopup()">OK</button>
    </div>
  </div>

  <script>
    function showPopup() {
      document.getElementById("popupOverlay").style.display = "flex";
    }

    function closePopup() {
      document.getElementById("popupOverlay").style.display = "none";
    }
  </script>
</body>
</html>
